name: Verify commit author
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit emails
        run: |
          ALLOWED="felipeospina21@hotmail.com|51976045+felipeospina21@users.noreply.github.com"
          BAD=$(git log --format='%ae' origin/main..HEAD | grep -vE "$ALLOWED" || true)
          if [ -n "$BAD" ]; then
            echo "::error::Commits from unauthorized emails: $BAD"
            exit 1
          fi
