version: 2

builds:
  - main: .
    binary: mrglab
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

changelog:
  use: github
  filters:
    exclude:
      - "^chore"
      - "^ci"

release:
  github:
    owner: felipeospina21
    name: mrglab
